version: "3.9"

services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - ai_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    security_opt:
      - no-new-privileges:true

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    profiles: ["ai"]
    depends_on:
      - ollama
      - postgres
      - redis
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/workspace
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    networks:
      - ai_net
      - backend_net
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    profiles: ["core"]
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    profiles: ["core"]
    volumes:
      - redis_data:/data
    networks:
      - backend_net

  padws:
    image: ghcr.io/pad-ws/pad.ws:latest
    container_name: padws
    restart: unless-stopped
    profiles: ["dev"]
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://openclaw:${POSTGRES_PASSWORD}@postgres:5432/openclaw
      - REDIS_URL=redis://redis:6379
    volumes:
      - padws_data:/data
    networks:
      - backend_net
    security_opt:
      - no-new-privileges:true

volumes:

  ollama_models:
  openclaw_config:
  openclaw_workspace:
  postgres_data:
  redis_data:
  padws_data:

networks:

  ai_net:
    driver: bridge

  backend_net:
    driver: bridge